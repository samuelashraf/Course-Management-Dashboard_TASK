@if (totalPages() >= 1) {
<div class="pager">
    <span class="pager-info"><span class="pager-count">{{ totalItems }}</span> results</span>
    <div class="pager-controls">
        <button class="pager-arrow" [disabled]="currentPage === 1" (click)="go(currentPage - 1)">
            <i class="bi bi-chevron-left"></i>
        </button>
        <div class="pager-pages">
            @for (page of pages(); track page) {
            <button class="pager-dot" [class.is-active]="page === currentPage" (click)="go(page)">{{ page }}</button>
            }
        </div>
        <button class="pager-arrow" [disabled]="currentPage === totalPages()" (click)="go(currentPage + 1)">
            <i class="bi bi-chevron-right"></i>
        </button>
    </div>
</div>
}
