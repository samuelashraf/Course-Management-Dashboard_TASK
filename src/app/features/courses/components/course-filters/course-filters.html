<div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
        <div class="row g-3 align-items-center">

            <div class="col-md-5">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0">
                        <i class="bi bi-search text-muted"></i>
                    </span>
                    <input type="text" class="form-control border-start-0" placeholder="Search by course name..."
                        [ngModel]="searchTerm" (ngModelChange)="searchChange.emit($event)" />
                </div>
            </div>

            <div class="col-md-3">
                <select class="form-select" [ngModel]="selectedStatus" (ngModelChange)="statusChange.emit($event)">
                    <option value="">All Statuses</option>
                    @for (s of statuses; track s) {
                    <option [value]="s">{{ s }}</option>
                    }
                </select>
            </div>
            <div class="col-md-3">



                <select class="form-select" [ngModel]="selectedSort" (ngModelChange)="sortChange.emit($event)">
                    <option value="" disabled>
                        Sort By
                    </option>

                    <option value="name">
                        Name
                    </option>

                    <option value="price">
                        Price
                    </option>

                    <option value="duration">
                        Duration
                    </option>

                    <option value="createdDate">
                        Created Date
                    </option>

                </select>

            </div>

        </div>
    </div>
</div>
