<div class="container-fluid py-4">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Courses</h2>
            <small class="text-muted">{{ filtered().length }} course(s) found</small>
        </div>
        <button class="btn btn-primary" (click)="goToCreat()">
            <i class="bi bi-plus-lg me-1"></i> Add Course
        </button>
    </div>
    <!---->
    <app-course-filters [searchTerm]="searchTerm" [selectedStatus]="selectedStatus" (searchChange)="onSearch($event)"
        (statusChange)="onStatusChange($event)" (sortChange)="onSortChange($event)" />

    <!-- Loading -->
    @if (isLoading) {

    <div class="card shadow-sm">

        <div class="table-responsive">

            <table class="table">

                <thead>
                    <tr>
                        <th>#</th>
                        <th>Course</th>
                        <th>Instructor</th>
                        <th>Category</th>
                        <th>Duration</th>
                        <th>Price</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>

                    @for(item of [1,2,3,4,5,6]; track item){

                    <tr>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>
                            <div class="skeleton skeleton-line"></div>
                        </td>

                        <td>

                            <div class="d-flex gap-2">

                                <div class="skeleton skeleton-btn"></div>

                                <div class="skeleton skeleton-btn"></div>

                                <div class="skeleton skeleton-btn"></div>

                            </div>

                        </td>

                    </tr>

                    }

                </tbody>

            </table>

        </div>

    </div>

    }


</div>
